<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Miracle Icha</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Lato:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100vh;
  background-color: #1A1612;
  font-family: 'Lato', sans-serif;
  color: #F0E6D0;
}

/* NAV */
.nav {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background-color: #241F19;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid #3D3528;
}
.nav-btn {
  background: none; border: none;
  font-family: 'EB Garamond', serif;
  font-size: 34px; line-height: 1;
  color: #D4A843; cursor: pointer;
  padding: 0 10px; opacity: 0.7;
}
.nav-btn:disabled { opacity: 0.18; }
.nav-btn:active { opacity: 1; }
.nav-date {
  font-family: 'EB Garamond', serif;
  font-style: italic; font-size: 14px;
  color: #F0E6D0; text-align: center;
}

/* PROGRESS */
.prog { height: 2px; background: #3D3528; }
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #C49A3A, #D4A843);
  transition: width 0.35s;
}

/* BANNER */
.banner {
  background-color: #241F19;
  min-height: 100px;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid #3D3528;
}
.banner-words {
  position: relative; z-index: 5;
  width: 220px; height: 80px;
}
.w-miracle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: 28px; color: #D4A843;
  line-height: 1; letter-spacing: 1.5px;
  position: absolute; top: 4px; left: 0;
}
.w-icha {
  font-family: 'Lato', sans-serif;
  font-weight: 700; font-size: 42px;
  color: #F0E6D0;
  line-height: 1; letter-spacing: 3px;
  position: absolute; bottom: 0; right: 0;
}

/* DATE + EMOJIS */
.date-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #1A1612;
}
.date-badge {
  background: #2C2620;
  border: 1px solid #3D3528;
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'EB Garamond', serif;
  font-style: italic; font-size: 13px;
  color: #F0E6D0;
}
.emojis {
  display: flex; gap: 6px;
}
.emoji-btn {
  background: #2C2620;
  border: 1.5px solid #3D3528;
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.emoji-btn.selected {
  border-color: #D4A843;
  background: #332C22;
  transform: scale(1.15);
}

/* PAGE */
.page { padding: 0 0 32px; }

/* SECTION */
.section { padding: 14px 16px 0; }
.section-title {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.section-bar {
  width: 3px; height: 22px;
  background: linear-gradient(180deg, #D4A843, #C49A3A);
  border-radius: 2px;
}
.section-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 17px;
  color: #F0E6D0;
}
.section-hint {
  font-size: 10px; color: #6A5A3A;
  margin-bottom: 8px; margin-left: 11px;
}

/* CARD */
.card {
  background: #2C2620;
  border-radius: 12px;
  border: 1px solid #3D3528;
  padding: 12px 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
textarea.field {
  width: 100%; 
  border: none; background: transparent;
  font-family: 'EB Garamond', serif;
  font-size: 15px; line-height: 2;
  color: #F0E6D0; resize: none; outline: none;
  background-image: repeating-linear-gradient(
    transparent, transparent calc(2em - 1px),
    #3D3528 calc(2em - 1px), #3D3528 2em
  );
  background-attachment: local;
  min-height: 112px;
}
textarea.field::placeholder { color: #4A4030; font-style: italic; }
textarea.field.short { min-height: 70px; }

/* TABLE */
.table-card {
  background: #2C2620;
  border-radius: 12px;
  border: 1px solid #3D3528;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.table-grid { display: grid; grid-template-columns: 1fr 1fr; }
.table-col:first-child { border-right: 1px solid #3D3528; }
.table-head {
  background: #332C22;
  padding: 8px 6px; text-align: center;
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: #D4A843;
  border-bottom: 1px solid #3D3528;
}
.table-input {
  display: block; width: 100%;
  border: none; border-bottom: 1px solid rgba(61,53,40,0.8);
  background: transparent; padding: 9px 10px;
  font-family: 'EB Garamond', serif; font-size: 14px;
  color: #F0E6D0; outline: none;
}
.table-input:last-child { border-bottom: none; }
.table-input:focus { background: #332C22; }
.table-input::placeholder { color: #4A4030; font-style: italic; }

/* SAVE */
.save-wrap { padding: 16px 16px 32px; }
.save-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #C49A3A, #D4A843);
  color: #1A1612;
  border: none; border-radius: 12px;
  font-family: 'Lato', sans-serif;
  font-weight: 700; font-size: 13px;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 3px 16px rgba(212,168,67,0.3);
  transition: opacity 0.2s, transform 0.1s;
}
.save-btn:active { opacity: 0.84; transform: scale(0.98); }
.save-ok {
  text-align: center;
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: 13px; color: #D4A843;
  margin-top: 8px; opacity: 0; transition: opacity 0.3s;
}
.save-ok.show { opacity: 1; }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn" id="prevBtn">&#8249;</button>
  <div class="nav-date" id="navDate"></div>
  <button class="nav-btn" id="nextBtn">&#8250;</button>
</nav>
<div class="prog"><div class="prog-fill" id="pFill"></div></div>

<div class="banner">
  <div class="banner-words">
    <span class="w-miracle">Miracle</span>
    <span class="w-icha">Icha</span>
  </div>
</div>

<!-- DATE + EMOJIS -->
<div class="date-row">
  <div class="date-badge" id="dateBadge"></div>
  <div class="emojis">
    <div class="emoji-btn" id="e1" onclick="selectEmoji(1)">😔</div>
    <div class="emoji-btn" id="e2" onclick="selectEmoji(2)">😐</div>
    <div class="emoji-btn" id="e3" onclick="selectEmoji(3)">🙂</div>
    <div class="emoji-btn" id="e4" onclick="selectEmoji(4)">😊</div>
  </div>
</div>

<div class="page">

  <!-- MOUHASABAT -->
  <div class="section">
    <div class="section-title">
      <div class="section-bar"></div>
      <div class="section-label">Mouhasabat an nafs</div>
    </div>
    <div class="section-hint">→ mes manquements, péchés + repentir sincère</div>
    <div class="card">
      <textarea class="field" id="mouTxt" placeholder="Écris ta réflexion ici…" rows="5"></textarea>
    </div>
  </div>

  <!-- TABLEAU -->
  <div class="section" style="padding-top:14px;">
    <div class="table-card">
      <div class="table-grid">
        <div class="table-col">
          <div class="table-head">🤲 Alhamdoulillah</div>
          <div id="colA"></div>
        </div>
        <div class="table-col">
          <div class="table-head">✨ Did it list Lillah</div>
          <div id="colB"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- INTENTION -->
  <div class="section" style="padding-top:14px;">
    <div class="section-title">
      <div class="section-bar"></div>
      <div class="section-label">Intention pour demain</div>
    </div>
    <div class="card">
      <textarea class="field short" id="intTxt" placeholder="Mon intention pour demain…" rows="4"></textarea>
    </div>
  </div>

  <!-- SAVE -->
  <div class="save-wrap">
    <button class="save-btn" id="saveBtn">✦ Sauvegarder</button>
    <div class="save-ok" id="saveOk">Sauvegardé · بارك الله فيك</div>
  </div>

</div>

<script>
const START = new Date(2026, 5, 17);
const END   = new Date(2026, 11, 31);
const DAYS  = Math.round((END - START) / 86400000) + 1;
const MOIS  = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
let day = 0;
let selectedEmoji = 0;

function dt(d) { const x=new Date(START); x.setDate(START.getDate()+d); return x; }
function fmt(d) { return `${JOURS[d.getDay()]} ${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}`; }

function selectEmoji(n) {
  selectedEmoji = n;
  [1,2,3,4].forEach(i => {
    document.getElementById('e'+i).classList.toggle('selected', i===n);
  });
}

function save(d) {
  localStorage.setItem('mi'+d, JSON.stringify({
    m: document.getElementById('mouTxt').value,
    a: [...document.querySelectorAll('.ia')].map(i=>i.value),
    b: [...document.querySelectorAll('.ib')].map(i=>i.value),
    int: document.getElementById('intTxt').value,
    emoji: selectedEmoji
  }));
}

function load(d) { const r=localStorage.getItem('mi'+d); return r?JSON.parse(r):null; }

function build(d) {
  day = d;
  const x = dt(d);
  document.getElementById('navDate').textContent = fmt(x);
  document.getElementById('dateBadge').textContent = fmt(x);
  document.getElementById('pFill').style.width = ((d+1)/DAYS*100)+'%';
  document.getElementById('prevBtn').disabled = d===0;
  document.getElementById('nextBtn').disabled = d===DAYS-1;

  const s = load(d);
  document.getElementById('mouTxt').value = s?.m || '';
  document.getElementById('intTxt').value = s?.int || '';
  
  selectedEmoji = s?.emoji || 0;
  [1,2,3,4].forEach(i => {
    document.getElementById('e'+i).classList.toggle('selected', i===selectedEmoji);
  });

  ['colA','colB'].forEach((id,ci) => {
    const el = document.getElementById(id); el.innerHTML='';
    const cls = ci?'ib':'ia', vals = ci?s?.b:s?.a;
    for(let r=0;r<6;r++){
      const inp = document.createElement('input');
      inp.type='text'; inp.className='table-input '+cls;
      inp.placeholder='…'; inp.value=vals?.[r]||'';
      el.appendChild(inp);
    }
  });
}

function todayIdx() {
  const t=new Date(); t.setHours(0,0,0,0);
  const s=new Date(START); s.setHours(0,0,0,0);
  return Math.max(0, Math.min(DAYS-1, Math.floor((t-s)/86400000)));
}

document.getElementById('prevBtn').onclick = ()=>{ if(day>0) build(day-1); };
document.getElementById('nextBtn').onclick = ()=>{ if(day<DAYS-1) build(day+1); };
document.getElementById('saveBtn').onclick = ()=>{
  save(day);
  const ok=document.getElementById('saveOk');
  ok.classList.add('show'); setTimeout(()=>ok.classList.remove('show'),2200);
};

let tm;
document.body.addEventListener('input', ()=>{ clearTimeout(tm); tm=setTimeout(()=>save(day),1000); });

build(todayIdx());
</script>
</body>
</html>
